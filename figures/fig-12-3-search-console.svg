<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-label="検索コンソールで見る3つの情報">
  <style>
    .card-box { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; }
    .p-num { fill: #C44536; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 19px; font-weight: 700; }
    .p-title { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 21px; font-weight: 700; }
    .p-desc { fill: #666; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 16px; font-weight: 500; }
    .keyword-tag { fill: #ffffff; stroke: #C44536; stroke-width: 1.5; }
    .keyword-text { fill: #C44536; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 14px; font-weight: 600; }
    .label-heading { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 24px; font-weight: 700; }
    .divider-h { stroke: #ddd; stroke-width: 1; fill: none; stroke-dasharray: 4,4; }
    .footer-headline { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
  </style>

  <text x="450" y="45" text-anchor="middle" class="label-heading">読者の本音が見える、3つの情報</text>

  <rect x="60" y="80" width="780" height="165" rx="10" class="card-box"/>
  <text x="90" y="120" class="p-num">01</text>
  <text x="150" y="120" class="p-title">どんなキーワードで検索されているか</text>
  <text x="90" y="155" class="p-desc">「在宅勤務の始め方」の記事で、実際に流入した検索語</text>

  <rect x="90" y="175" width="180" height="40" rx="20" class="keyword-tag"/>
  <text x="180" y="200" text-anchor="middle" class="keyword-text">在宅勤務 集中できない</text>

  <rect x="285" y="175" width="220" height="40" rx="20" class="keyword-tag"/>
  <text x="395" y="200" text-anchor="middle" class="keyword-text">リモートワーク 始め方</text>

  <rect x="520" y="175" width="220" height="40" rx="20" class="keyword-tag"/>
  <text x="630" y="200" text-anchor="middle" class="keyword-text">在宅勤務 必要なもの</text>

  <rect x="60" y="265" width="780" height="130" rx="10" class="card-box"/>
  <text x="90" y="305" class="p-num">02</text>
  <text x="150" y="305" class="p-title">検索順位</text>
  <text x="90" y="340" class="p-desc">10位以内＝1ページ目。11〜20位＝2ページ目、改善余地大</text>
  <text x="90" y="368" class="p-desc" style="fill:#C44536; font-weight:700;">順位が下がってきている記事は、リライトの優先候補</text>

  <rect x="60" y="425" width="780" height="130" rx="10" class="card-box"/>
  <text x="90" y="465" class="p-num">03</text>
  <text x="150" y="465" class="p-title">クリック率</text>
  <text x="90" y="500" class="p-desc">検索結果に表示された時、実際にクリックされた割合</text>
  <text x="90" y="528" class="p-desc" style="fill:#C44536; font-weight:700;">順位は良いのに低い→見出しの書き直しで改善する</text>

  <line x1="80" y1="600" x2="820" y2="600" class="divider-h"/>
  <text x="450" y="655" text-anchor="middle" class="footer-headline">公開後の記事を磨く時、まずここを見る</text>
</svg>
