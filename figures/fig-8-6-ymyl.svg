<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 950" role="img" aria-label="YMYL分野での責任">
  <style>
    .ymyl-box { fill: #1a1a1a; }
    .ymyl-label { fill: #C44536; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 17px; font-weight: 700; letter-spacing: 0.1em; }
    .ymyl-text { fill: #ffffff; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 24px; font-weight: 700; }
    .ymyl-sub { fill: #ccc; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 17px; font-weight: 500; }
    .field-box { fill: #ffffff; stroke: #999; stroke-width: 2; }
    .field-text { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 18px; font-weight: 600; }
    .p-num { fill: #C44536; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 18px; font-weight: 700; }
    .p-title { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 18px; font-weight: 700; }
    .card-box { fill: #ffffff; stroke: #C44536; stroke-width: 2; }
    .label-heading { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 24px; font-weight: 700; }
    .divider-h { stroke: #ddd; stroke-width: 1; fill: none; stroke-dasharray: 4,4; }
    .footer-headline { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
  </style>

  <rect x="80" y="30" width="740" height="130" rx="12" class="ymyl-box"/>
  <text x="450" y="70" text-anchor="middle" class="ymyl-label">YOUR MONEY OR YOUR LIFE</text>
  <text x="450" y="110" text-anchor="middle" class="ymyl-text">あなたのお金、またはあなたの命</text>
  <text x="450" y="140" text-anchor="middle" class="ymyl-sub">読者の人生に大きな影響を与えるテーマ</text>

  <text x="450" y="200" text-anchor="middle" class="label-heading">対象となる5つの分野</text>

  <rect x="60" y="225" width="150" height="70" rx="8" class="field-box"/>
  <text x="135" y="267" text-anchor="middle" class="field-text">医療・健康</text>

  <rect x="225" y="225" width="150" height="70" rx="8" class="field-box"/>
  <text x="300" y="267" text-anchor="middle" class="field-text">金融・投資</text>

  <rect x="390" y="225" width="120" height="70" rx="8" class="field-box"/>
  <text x="450" y="267" text-anchor="middle" class="field-text">法律</text>

  <rect x="525" y="225" width="120" height="70" rx="8" class="field-box"/>
  <text x="585" y="267" text-anchor="middle" class="field-text">安全</text>

  <rect x="660" y="225" width="180" height="70" rx="8" class="field-box"/>
  <text x="750" y="267" text-anchor="middle" class="field-text">教育</text>

  <line x1="80" y1="335" x2="820" y2="335" class="divider-h"/>
  <text x="450" y="390" text-anchor="middle" class="label-heading">YMYL分野で踏み込む時の、3つの心得</text>

  <rect x="60" y="420" width="780" height="110" rx="10" class="card-box"/>
  <text x="90" y="460" class="p-num">01</text>
  <text x="150" y="460" class="p-title">専門家の意見を引用する</text>
  <text x="150" y="495" class="field-text" style="font-size:16px; font-weight:500; fill:#666;">「◯◯医師の見解によると」と明記する</text>

  <rect x="60" y="540" width="780" height="110" rx="10" class="card-box"/>
  <text x="90" y="580" class="p-num">02</text>
  <text x="150" y="580" class="p-title">「個人の意見です」と明示する</text>
  <text x="150" y="615" class="field-text" style="font-size:16px; font-weight:500; fill:#666;">体験談と医学的助言を、はっきり分ける</text>

  <rect x="60" y="660" width="780" height="110" rx="10" class="card-box"/>
  <text x="90" y="700" class="p-num">03</text>
  <text x="150" y="700" class="p-title">専門家への相談を促す</text>
  <text x="150" y="735" class="field-text" style="font-size:16px; font-weight:500; fill:#666;">「気になる方は医師に相談してください」</text>

  <line x1="80" y1="800" x2="820" y2="800" class="divider-h"/>
  <text x="450" y="855" text-anchor="middle" class="footer-headline">自分が書ける範囲を、しっかり見極める</text>
</svg>
