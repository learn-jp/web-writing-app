<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" role="img" aria-label="SNSからあなたの場所へ導く設計">
  <style>
    .label { fill: #666; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 19px; font-weight: 700; }
    .label-red { fill: #C44536; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 19px; font-weight: 700; }
    .sns-box { fill: #ffffff; stroke: #999; stroke-width: 2; }
    .sns-text { fill: #666; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 18px; font-weight: 600; }
    .place-box { fill: #C44536; stroke: #C44536; stroke-width: 3; }
    .place-text { fill: #ffffff; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 18px; font-weight: 700; }
    .arrow-red { stroke: #C44536; stroke-width: 3; fill: none; }
    .tag { fill: #999; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 16px; font-weight: 500; font-style: italic; }
    .tag-red { fill: #C44536; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 16px; font-weight: 700; font-style: italic; }
    .divider-h { stroke: #ddd; stroke-width: 1; fill: none; stroke-dasharray: 4,4; }
    .footer-headline { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
    .footer { fill: #444; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 500; }
  </style>

  <text x="230" y="55" text-anchor="middle" class="label">SNS</text>
  <text x="230" y="85" text-anchor="middle" class="tag">出会いの場所・借りた資産</text>

  <rect x="80" y="110" width="160" height="80" rx="8" class="sns-box"/>
  <text x="160" y="157" text-anchor="middle" class="sns-text">X</text>

  <rect x="80" y="205" width="160" height="80" rx="8" class="sns-box"/>
  <text x="160" y="252" text-anchor="middle" class="sns-text">Instagram</text>

  <rect x="80" y="300" width="160" height="80" rx="8" class="sns-box"/>
  <text x="160" y="347" text-anchor="middle" class="sns-text">TikTok</text>

  <line x1="260" y1="245" x2="330" y2="245" class="arrow-red"/>
  <polygon points="325,238 345,245 325,252" fill="#C44536"/>

  <text x="680" y="55" text-anchor="middle" class="label-red">あなたの場所</text>
  <text x="680" y="85" text-anchor="middle" class="tag-red">関係を深める場所・自分の資産</text>

  <rect x="600" y="110" width="180" height="80" rx="8" class="place-box"/>
  <text x="690" y="157" text-anchor="middle" class="place-text">自分のブログ</text>

  <rect x="600" y="205" width="180" height="80" rx="8" class="place-box"/>
  <text x="690" y="252" text-anchor="middle" class="place-text">noteアカウント</text>

  <rect x="600" y="300" width="180" height="80" rx="8" class="place-box"/>
  <text x="690" y="347" text-anchor="middle" class="place-text">メールマガジン</text>

  <line x1="80" y1="440" x2="820" y2="440" class="divider-h"/>

  <text x="450" y="500" text-anchor="middle" class="label" style="font-size:22px;">具体的な導線の作り方</text>

  <text x="90" y="555" class="sns-text" style="font-size:19px;">・プロフィールに「あなたの場所」へのリンクを置く</text>
  <text x="90" y="595" class="sns-text" style="font-size:19px;">・「続きはあちらで」と自然に案内する</text>
  <text x="90" y="635" class="sns-text" style="font-size:19px;">・「あなたの場所」でも、定期的に発信する</text>

  <line x1="80" y1="690" x2="820" y2="690" class="divider-h"/>
  <text x="450" y="745" text-anchor="middle" class="footer-headline">プラットフォームが変わっても、ファンを連れて移動できる</text>
</svg>
