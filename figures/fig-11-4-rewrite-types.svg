<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-label="4つのリライト方法">
  <style>
    .quad-box { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; }
    .quad-title { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 700; }
    .quad-desc { fill: #666; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 15px; font-weight: 500; }
    .doc-full { fill: #C44536; stroke: #C44536; stroke-width: 1.5; }
    .doc-outline { fill: #ffffff; stroke: #999; stroke-width: 1.5; }
    .doc-partial-bg { fill: #ffffff; stroke: #999; stroke-width: 1.5; }
    .doc-partial-fg { fill: #C44536; }
    .icon-arrow { stroke: #C44536; stroke-width: 2; fill: none; }
    .divider-h { stroke: #ddd; stroke-width: 1; fill: none; stroke-dasharray: 4,4; }
    .footer-headline { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
    .label-heading { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 24px; font-weight: 700; }
  </style>

  <text x="450" y="45" text-anchor="middle" class="label-heading">状況に応じて、方法を選ぶ</text>

  <!-- 全面リライト -->
  <rect x="60" y="80" width="365" height="220" rx="10" class="quad-box"/>
  <text x="242" y="118" text-anchor="middle" class="quad-title">全面リライト</text>
  <rect x="200" y="140" width="85" height="105" class="doc-full"/>
  <line x1="325" y1="192" x2="365" y2="192" class="icon-arrow"/>
  <polygon points="358,185 378,192 358,199" fill="#C44536"/>
  <text x="242" y="272" text-anchor="middle" class="quad-desc">ゼロから書き直す</text>

  <!-- 部分リライト -->
  <rect x="475" y="80" width="365" height="220" rx="10" class="quad-box"/>
  <text x="657" y="118" text-anchor="middle" class="quad-title">部分リライト</text>
  <rect x="615" y="140" width="85" height="105" class="doc-partial-bg"/>
  <rect x="615" y="140" width="85" height="35" class="doc-partial-fg"/>
  <text x="657" y="272" text-anchor="middle" class="quad-desc">一部だけ書き直す</text>

  <!-- 統合リライト -->
  <rect x="60" y="330" width="365" height="220" rx="10" class="quad-box"/>
  <text x="242" y="368" text-anchor="middle" class="quad-title">統合リライト</text>
  <rect x="160" y="390" width="60" height="80" class="doc-outline"/>
  <rect x="230" y="390" width="60" height="80" class="doc-outline"/>
  <line x1="220" y1="430" x2="260" y2="430" class="icon-arrow"/>
  <polygon points="253,423 273,430 253,437" fill="#C44536"/>
  <rect x="285" y="390" width="60" height="80" class="doc-full"/>
  <text x="242" y="522" text-anchor="middle" class="quad-desc">複数記事を1つにまとめる</text>

  <!-- 分割リライト -->
  <rect x="475" y="330" width="365" height="220" rx="10" class="quad-box"/>
  <text x="657" y="368" text-anchor="middle" class="quad-title">分割リライト</text>
  <rect x="580" y="390" width="60" height="80" class="doc-full"/>
  <line x1="640" y1="430" x2="680" y2="430" class="icon-arrow"/>
  <polygon points="673,423 693,430 673,437" fill="#C44536"/>
  <rect x="705" y="390" width="55" height="80" class="doc-outline"/>
  <rect x="770" y="390" width="55" height="80" class="doc-outline"/>
  <text x="657" y="522" text-anchor="middle" class="quad-desc">1記事を複数に分ける</text>

  <line x1="80" y1="590" x2="820" y2="590" class="divider-h"/>
  <text x="450" y="645" text-anchor="middle" class="label-heading">選び方の目安</text>
  <text x="450" y="695" text-anchor="middle" class="quad-desc" style="font-size:19px;">情報が古いだけ→部分 / 構成が悪い→全面 / 内容が薄い→統合・分割</text>

  <line x1="80" y1="740" x2="820" y2="740" class="divider-h"/>
  <text x="450" y="795" text-anchor="middle" class="footer-headline">何を直したいのか、明確にしてから取りかかる</text>
</svg>
