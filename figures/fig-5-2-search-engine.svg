<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-label="検索エンジンの基本動作">
  <style>
    .step-box { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; }
    .step-num { fill: #C44536; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 22px; font-weight: 700; }
    .step-title { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
    .step-desc { fill: #666; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 19px; font-weight: 500; }
    .arrow-red { stroke: #C44536; stroke-width: 3; fill: none; }
    .card-box { fill: #ffffff; stroke: #C44536; stroke-width: 2; }
    .card-title { fill: #C44536; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 19px; font-weight: 700; }
    .card-label { fill: #666; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 16px; font-weight: 500; }
    .divider-h { stroke: #ddd; stroke-width: 1; fill: none; stroke-dasharray: 4,4; }
    .footer-headline { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
    .footer { fill: #444; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 500; }
  </style>

  <rect x="60" y="40" width="780" height="110" rx="10" class="step-box"/>
  <text x="90" y="88" class="step-num">01</text>
  <text x="150" y="88" class="step-title">クロール</text>
  <text x="150" y="126" class="step-desc">ロボットが世界中のページを巡回し、内容を読み取る</text>

  <line x1="450" y1="150" x2="450" y2="185" class="arrow-red"/>
  <polygon points="440,180 450,200 460,180" fill="#C44536"/>

  <rect x="60" y="200" width="780" height="110" rx="10" class="step-box"/>
  <text x="90" y="248" class="step-num">02</text>
  <text x="150" y="248" class="step-title">インデックス</text>
  <text x="150" y="286" class="step-desc">読み取った内容が、巨大なデータベースに登録される</text>

  <line x1="450" y1="310" x2="450" y2="345" class="arrow-red"/>
  <polygon points="440,340 450,360 460,340" fill="#C44536"/>

  <rect x="60" y="360" width="780" height="110" rx="10" class="step-box"/>
  <text x="90" y="408" class="step-num">03</text>
  <text x="150" y="408" class="step-title">ランキング</text>
  <text x="150" y="446" class="step-desc">検索されると、最適なページが選ばれ、並べられる</text>

  <line x1="80" y1="510" x2="820" y2="510" class="divider-h"/>
  <text x="450" y="565" text-anchor="middle" class="footer-headline">ランキングを決める、3つの基本要素</text>

  <rect x="60" y="605" width="240" height="150" rx="10" class="card-box"/>
  <text x="180" y="645" text-anchor="middle" class="card-label">CHECK</text>
  <text x="180" y="695" text-anchor="middle" class="card-title">問いに答えて</text>
  <text x="180" y="720" text-anchor="middle" class="card-title">いるか</text>

  <rect x="330" y="605" width="240" height="150" rx="10" class="card-box"/>
  <text x="450" y="645" text-anchor="middle" class="card-label">CHECK</text>
  <text x="450" y="695" text-anchor="middle" class="card-title">信頼できる</text>
  <text x="450" y="720" text-anchor="middle" class="card-title">情報源か</text>

  <rect x="600" y="605" width="240" height="150" rx="10" class="card-box"/>
  <text x="720" y="645" text-anchor="middle" class="card-label">CHECK</text>
  <text x="720" y="695" text-anchor="middle" class="card-title">構造化</text>
  <text x="720" y="720" text-anchor="middle" class="card-title">されているか</text>

  <line x1="80" y1="800" x2="820" y2="800" class="divider-h"/>
  <text x="450" y="855" text-anchor="middle" class="footer">誠実に応える文章は、機械にも自然に評価される</text>
</svg>
