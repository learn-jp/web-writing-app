<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-label="短い画面で伝える構成の3つの工夫">
  <style>
    .phone-body { fill: #ffffff; stroke: #1a1a1a; stroke-width: 3; }
    .phone-notch { fill: #1a1a1a; }
    .lead-box { fill: #C44536; opacity: 0.12; stroke: #C44536; stroke-width: 2; stroke-dasharray: 4,3; }
    .heading-box { fill: #eee; }
    .text-line { stroke: #ccc; stroke-width: 2.5; fill: none; }
    .callout-num { fill: #C44536; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 18px; font-weight: 700; }
    .callout-title { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 19px; font-weight: 700; }
    .callout-desc { fill: #666; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 15px; font-weight: 500; }
    .connector { stroke: #C44536; stroke-width: 1.5; fill: none; stroke-dasharray: 3,3; }
    .divider-h { stroke: #ddd; stroke-width: 1; fill: none; stroke-dasharray: 4,4; }
    .footer-headline { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
  </style>

  <!-- スマホ本体 -->
  <rect x="330" y="40" width="240" height="480" rx="30" class="phone-body"/>
  <rect x="410" y="55" width="80" height="18" rx="9" class="phone-notch"/>

  <!-- リード文エリア（1. 最初の3行） -->
  <rect x="350" y="100" width="200" height="70" rx="4" class="lead-box"/>
  <line x1="360" y1="120" x2="540" y2="120" class="text-line"/>
  <line x1="360" y1="140" x2="540" y2="140" class="text-line"/>
  <line x1="360" y1="160" x2="490" y2="160" class="text-line"/>

  <!-- 見出し1（3. 見出しを多めに） -->
  <rect x="350" y="190" width="200" height="24" rx="4" class="heading-box"/>
  <line x1="360" y1="235" x2="540" y2="235" class="text-line"/>
  <line x1="360" y1="255" x2="500" y2="255" class="text-line"/>

  <!-- 段落区切り（2. こまめな段落） -->
  <line x1="360" y1="290" x2="540" y2="290" class="text-line"/>
  <line x1="360" y1="310" x2="540" y2="310" class="text-line"/>
  <line x1="360" y1="330" x2="480" y2="330" class="text-line"/>

  <line x1="360" y1="365" x2="540" y2="365" class="text-line"/>
  <line x1="360" y1="385" x2="520" y2="385" class="text-line"/>

  <!-- 見出し2 -->
  <rect x="350" y="415" width="200" height="24" rx="4" class="heading-box"/>
  <line x1="360" y1="460" x2="540" y2="460" class="text-line"/>
  <line x1="360" y1="480" x2="500" y2="480" class="text-line"/>

  <!-- 注釈1: 最初の3行 -->
  <line x1="330" y1="135" x2="150" y2="135" class="connector"/>
  <text x="60" y="110" class="callout-num">01</text>
  <text x="60" y="140" class="callout-title" style="font-size:16px;">最初の3行で</text>
  <text x="60" y="163" class="callout-title" style="font-size:16px;">価値を伝える</text>

  <!-- 注釈2: 段落区切り -->
  <line x1="570" y1="310" x2="750" y2="310" class="connector"/>
  <text x="840" y="285" text-anchor="end" class="callout-num">02</text>
  <text x="840" y="315" text-anchor="end" class="callout-title" style="font-size:16px;">3〜4行で</text>
  <text x="840" y="338" text-anchor="end" class="callout-title" style="font-size:16px;">段落を区切る</text>

  <!-- 注釈3: 見出し -->
  <line x1="330" y1="427" x2="150" y2="427" class="connector"/>
  <text x="60" y="405" class="callout-num">03</text>
  <text x="60" y="435" class="callout-title" style="font-size:16px;">見出しを</text>
  <text x="60" y="458" class="callout-title" style="font-size:16px;">多めに入れる</text>

  <line x1="80" y1="580" x2="820" y2="580" class="divider-h"/>
  <text x="450" y="640" text-anchor="middle" class="footer-headline">見出しは「現在地を示す看板」</text>
  <text x="450" y="685" text-anchor="middle" class="callout-desc" style="font-size:19px;">目安は、2〜3スクロールに1つ</text>
</svg>
