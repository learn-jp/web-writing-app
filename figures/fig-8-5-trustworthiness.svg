<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 950" role="img" aria-label="信頼性はE-E-A-Tの頂点">
  <style>
    .base-box { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; }
    .base-text { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 20px; font-weight: 700; }
    .top-tri { fill: #C44536; stroke: #C44536; stroke-width: 3; }
    .top-text { fill: #ffffff; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
    .top-sub { fill: #ffe5e2; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 16px; font-weight: 500; }
    .p-num { fill: #C44536; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 18px; font-weight: 700; }
    .p-title { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 19px; font-weight: 700; }
    .card-box { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; }
    .label-heading { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 24px; font-weight: 700; }
    .divider-h { stroke: #ddd; stroke-width: 1; fill: none; stroke-dasharray: 4,4; }
    .footer-headline { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
  </style>

  <text x="450" y="45" text-anchor="middle" class="label-heading">E-E-A-Tの中で、最も重要な観点</text>

  <!-- 頂点：T (信頼性) -->
  <polygon points="450,75 340,195 560,195" class="top-tri"/>
  <text x="450" y="155" text-anchor="middle" class="top-text">T</text>
  <text x="450" y="180" text-anchor="middle" class="top-sub" style="font-size:13px;">信頼性</text>

  <!-- 支える3要素 -->
  <rect x="80" y="215" width="230" height="90" rx="8" class="base-box"/>
  <text x="195" y="250" text-anchor="middle" class="base-text" style="font-size:17px;">E 経験</text>
  <text x="195" y="280" text-anchor="middle" class="p-title" style="font-size:14px; font-weight:500; fill:#666;">体験している</text>

  <rect x="335" y="215" width="230" height="90" rx="8" class="base-box"/>
  <text x="450" y="250" text-anchor="middle" class="base-text" style="font-size:17px;">E 専門性</text>
  <text x="450" y="280" text-anchor="middle" class="p-title" style="font-size:14px; font-weight:500; fill:#666;">深く理解している</text>

  <rect x="590" y="215" width="230" height="90" rx="8" class="base-box"/>
  <text x="705" y="250" text-anchor="middle" class="base-text" style="font-size:17px;">A 権威性</text>
  <text x="705" y="280" text-anchor="middle" class="p-title" style="font-size:14px; font-weight:500; fill:#666;">外部から評価される</text>

  <text x="450" y="350" text-anchor="middle" class="p-title" style="font-size:19px;">この3つを総合して、信頼性が決まる</text>

  <line x1="80" y1="395" x2="820" y2="395" class="divider-h"/>
  <text x="450" y="450" text-anchor="middle" class="label-heading">信頼性を高める、4つの実践</text>

  <rect x="60" y="480" width="365" height="105" rx="10" class="card-box"/>
  <text x="90" y="518" class="p-num">01</text>
  <text x="150" y="518" class="p-title">根拠を示す</text>
  <text x="150" y="550" class="p-title" style="font-size:15px; font-weight:500; fill:#666;">出典を明確に書く</text>

  <rect x="475" y="480" width="365" height="105" rx="10" class="card-box"/>
  <text x="505" y="518" class="p-num">02</text>
  <text x="565" y="518" class="p-title">著者情報を明確に</text>
  <text x="565" y="550" class="p-title" style="font-size:15px; font-weight:500; fill:#666;">誰が書いたか分かるように</text>

  <rect x="60" y="600" width="365" height="105" rx="10" class="card-box"/>
  <text x="90" y="638" class="p-num">03</text>
  <text x="150" y="638" class="p-title">更新日を明確に</text>
  <text x="150" y="670" class="p-title" style="font-size:15px; font-weight:500; fill:#666;">情報の鮮度を示す</text>

  <rect x="475" y="600" width="365" height="105" rx="10" class="card-box"/>
  <text x="505" y="638" class="p-num">04</text>
  <text x="565" y="638" class="p-title">間違いを認める</text>
  <text x="565" y="670" class="p-title" style="font-size:15px; font-weight:500; fill:#666;">潔く修正し、訂正を明示</text>

  <line x1="80" y1="745" x2="820" y2="745" class="divider-h"/>
  <text x="450" y="800" text-anchor="middle" class="footer-headline">信頼は静かに、しかし確実に積み上がる</text>
</svg>
