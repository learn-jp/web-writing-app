<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-label="SNSと検索エンジンの相互関係">
  <style>
    .node-box { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; }
    .node-box-red { fill: #C44536; stroke: #C44536; stroke-width: 3; }
    .node-title { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 700; }
    .node-title-white { fill: #ffffff; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 700; }
    .node-sub { fill: #666; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 16px; font-weight: 500; }
    .arrow-red { stroke: #C44536; stroke-width: 3; fill: none; }
    .arrow-label { fill: #C44536; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 16px; font-weight: 700; }
    .divider-h { stroke: #ddd; stroke-width: 1; fill: none; stroke-dasharray: 4,4; }
    .footer-headline { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
    .footer { fill: #444; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 500; }
  </style>

  <text x="450" y="50" text-anchor="middle" class="node-title">互いに影響し合うエコシステム</text>

  <!-- 循環：SNS発信 → 検索結果に表示 → シェア増 → 評価アップ → SNS発信 -->
  <rect x="330" y="90" width="240" height="110" rx="10" class="node-box-red"/>
  <text x="450" y="135" text-anchor="middle" class="node-title-white">SNS発信</text>
  <text x="450" y="165" text-anchor="middle" class="node-sub" style="fill:#ffe5e2;">在宅勤務のコツを投稿</text>

  <line x1="570" y1="145" x2="700" y2="145" class="arrow-red"/>
  <polygon points="695,138 715,145 695,152" fill="#C44536"/>

  <rect x="620" y="280" width="230" height="100" rx="10" class="node-box"/>
  <text x="735" y="320" text-anchor="middle" class="node-title" style="font-size:19px;">検索結果に表示</text>
  <text x="735" y="350" text-anchor="middle" class="node-sub">Google検索にも登場</text>

  <line x1="700" y1="380" x2="600" y2="530" class="arrow-red"/>
  <polygon points="595,520 590,543 613,533" fill="#C44536"/>

  <rect x="380" y="550" width="230" height="100" rx="10" class="node-box"/>
  <text x="495" y="590" text-anchor="middle" class="node-title" style="font-size:19px;">シェアが増える</text>
  <text x="495" y="620" text-anchor="middle" class="node-sub">サイトへのアクセス増</text>

  <line x1="380" y1="600" x2="230" y2="470" class="arrow-red"/>
  <polygon points="235,478 213,468 227,448" fill="#C44536"/>

  <rect x="50" y="280" width="230" height="100" rx="10" class="node-box"/>
  <text x="165" y="320" text-anchor="middle" class="node-title" style="font-size:19px;">検索評価アップ</text>
  <text x="165" y="350" text-anchor="middle" class="node-sub">「価値がある」と判断</text>

  <line x1="180" y1="280" x2="360" y2="175" class="arrow-red"/>
  <polygon points="350,180 373,172 365,195" fill="#C44536"/>

  <line x1="80" y1="700" x2="820" y2="700" class="divider-h"/>
  <text x="450" y="758" text-anchor="middle" class="footer-headline">SNSとブログは、別物ではない</text>
  <text x="450" y="805" text-anchor="middle" class="footer">全てが繋がった、一つのエコシステム</text>
</svg>
