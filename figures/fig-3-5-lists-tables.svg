<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1120" role="img" aria-label="文章・リスト・表の使い分け">
  <style>
    .box-plain { fill: #fafafa; stroke: #999; stroke-width: 2; }
    .box-list { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; }
    .box-table { fill: #ffffff; stroke: #C44536; stroke-width: 3; }
    .stage-label { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 30px; font-weight: 700; }
    .stage-label-red { fill: #C44536; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 30px; font-weight: 700; }
    .stage-caption { fill: #666; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 500; }
    .body-text { fill: #333; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 500; }
    .list-bullet { fill: #C44536; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 24px; font-weight: 700; }
    .list-text { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 500; }
    .table-header { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 20px; font-weight: 700; }
    .table-cell { fill: #333; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 20px; font-weight: 500; }
    .table-line { stroke: #ddd; stroke-width: 1; fill: none; }
    .arrow-down { stroke: #C44536; stroke-width: 3; fill: none; }
    .arrow-label { fill: #C44536; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 700; }
    .footer-headline { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
    .footer { fill: #444; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 500; }
    .divider-h { stroke: #ddd; stroke-width: 1; fill: none; stroke-dasharray: 4,4; }
  </style>

  <!-- ═══════════ Stage 1: 文章 ═══════════ -->
  <text x="60" y="55" class="stage-label">文章</text>
  <text x="160" y="55" class="stage-caption">— 情報がひとつなぎ</text>

  <rect x="60" y="80" width="780" height="150" rx="10" class="box-plain"/>
  <text x="90" y="130" class="body-text">在宅勤務に必要なものは、まず机と椅子、それから</text>
  <text x="90" y="165" class="body-text">安定したネット回線、モニター（あれば便利）、</text>
  <text x="90" y="200" class="body-text">それとマイクなども揃えておくと安心です。</text>

  <!-- Arrow: 文章 → リスト -->
  <line x1="450" y1="245" x2="450" y2="285" class="arrow-down"/>
  <polygon points="437,278 450,300 463,278" fill="#C44536"/>
  <text x="530" y="270" class="arrow-label">項目に分ける</text>

  <!-- ═══════════ Stage 2: リスト ═══════════ -->
  <text x="60" y="345" class="stage-label">リスト</text>
  <text x="200" y="345" class="stage-caption">— 項目が並列に見える</text>

  <rect x="60" y="370" width="780" height="220" rx="10" class="box-list"/>
  <text x="100" y="415" class="list-bullet">•</text>
  <text x="130" y="415" class="list-text">机</text>

  <text x="100" y="450" class="list-bullet">•</text>
  <text x="130" y="450" class="list-text">椅子</text>

  <text x="100" y="485" class="list-bullet">•</text>
  <text x="130" y="485" class="list-text">ネット回線</text>

  <text x="100" y="520" class="list-bullet">•</text>
  <text x="130" y="520" class="list-text">モニター(あれば)</text>

  <text x="100" y="555" class="list-bullet">•</text>
  <text x="130" y="555" class="list-text">マイク(あれば)</text>

  <!-- Arrow: リスト → 表 -->
  <line x1="450" y1="605" x2="450" y2="645" class="arrow-down"/>
  <polygon points="437,638 450,660 463,638" fill="#C44536"/>
  <text x="530" y="630" class="arrow-label">属性を対比</text>

  <!-- ═══════════ Stage 3: 表 ═══════════ -->
  <text x="60" y="705" class="stage-label-red">表</text>
  <text x="110" y="705" class="stage-caption">— 縦横の関係で情報が立体的に</text>

  <rect x="60" y="730" width="780" height="220" rx="10" class="box-table"/>

  <!-- Table headers -->
  <text x="130" y="770" class="table-header">項目</text>
  <text x="380" y="770" class="table-header">必要度</text>
  <text x="620" y="770" class="table-header">予算目安</text>

  <line x1="80" y1="785" x2="820" y2="785" class="table-line"/>

  <!-- Row 1: 机 -->
  <text x="130" y="820" class="table-cell">机</text>
  <text x="380" y="820" class="table-cell">必須</text>
  <text x="620" y="820" class="table-cell">2〜5万円</text>

  <line x1="80" y1="835" x2="820" y2="835" class="table-line"/>

  <!-- Row 2: 椅子 -->
  <text x="130" y="870" class="table-cell">椅子</text>
  <text x="380" y="870" class="table-cell">必須</text>
  <text x="620" y="870" class="table-cell">3〜10万円</text>

  <line x1="80" y1="885" x2="820" y2="885" class="table-line"/>

  <!-- Row 3: モニター -->
  <text x="130" y="920" class="table-cell">モニター</text>
  <text x="380" y="920" class="table-cell">推奨</text>
  <text x="620" y="920" class="table-cell">2〜4万円</text>

  <!-- ═══════════ Divider ═══════════ -->
  <line x1="80" y1="1005" x2="820" y2="1005" class="divider-h"/>

  <!-- ═══════════ Bottom message ═══════════ -->
  <text x="450" y="1060" text-anchor="middle" class="footer-headline">情報の整理度が上がるほど、伝わり方は速くなる</text>
  <text x="450" y="1100" text-anchor="middle" class="footer">目的に応じて、最適な「形」を選ぼう</text>
</svg>
