<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1120" role="img" aria-label="プラットフォームごとの違い">
  <style>
    .top-question { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 28px; font-weight: 700; }
    .top-caption { fill: #666; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 20px; font-weight: 500; }
    .platform-box { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; }
    .platform-header { fill: #1a1a1a; }
    .platform-label { fill: #ffe5e2; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 15px; font-weight: 700; }
    .platform-title { fill: #ffffff; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 24px; font-weight: 700; }
    .platform-desc-label { fill: #C44536; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 17px; font-weight: 700; }
    .platform-desc { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 19px; font-weight: 500; }
    .platform-key-label { fill: #C44536; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 17px; font-weight: 700; }
    .platform-key { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 20px; font-weight: 600; }
    .platform-divider { stroke: #eee; stroke-width: 1; fill: none; }
    .line-red { stroke: #C44536; stroke-width: 3; fill: none; }
    .core-box { fill: #C44536; stroke: #C44536; stroke-width: 3; }
    .core-label { fill: #ffe5e2; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 20px; font-weight: 500; letter-spacing: 0.2em; }
    .core-main { fill: #ffffff; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 30px; font-weight: 700; }
    .core-sub { fill: #ffe5e2; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 21px; font-weight: 500; }
    .divider-h { stroke: #ddd; stroke-width: 1; fill: none; stroke-dasharray: 4,4; }
    .footer-headline { fill: #1a1a1a; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 26px; font-weight: 700; }
    .footer { fill: #444; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; font-size: 22px; font-weight: 500; }
  </style>

  <!-- ═══════════ Top: Question ═══════════ -->
  <text x="450" y="60" text-anchor="middle" class="top-question">どこに書くかで、書き方が変わる</text>
  <text x="450" y="95" text-anchor="middle" class="top-caption">個人クリエイターが使う、3つの主要なプラットフォーム</text>

  <!-- ═══════════ Branching lines ═══════════ -->
  <line x1="450" y1="115" x2="450" y2="155" class="line-red"/>
  <line x1="160" y1="155" x2="740" y2="155" class="line-red"/>
  <line x1="160" y1="155" x2="160" y2="195" class="line-red"/>
  <polygon points="150,190 160,210 170,190" fill="#C44536"/>
  <line x1="450" y1="155" x2="450" y2="195" class="line-red"/>
  <polygon points="440,190 450,210 460,190" fill="#C44536"/>
  <line x1="740" y1="155" x2="740" y2="195" class="line-red"/>
  <polygon points="730,190 740,210 750,190" fill="#C44536"/>

  <!-- ═══════════ Platform 1: note・ブログ ═══════════ -->
  <rect x="30" y="220" width="260" height="460" rx="10" class="platform-box"/>
  <!-- Header -->
  <rect x="30" y="220" width="260" height="80" rx="10" class="platform-header"/>
  <rect x="30" y="280" width="260" height="20" class="platform-header"/>
  <text x="50" y="252" class="platform-label">PLATFORM 01</text>
  <text x="160" y="285" text-anchor="middle" class="platform-title">note・ブログ</text>
  <!-- Body -->
  <text x="50" y="340" class="platform-desc-label">特徴</text>
  <text x="160" y="385" text-anchor="middle" class="platform-desc">長文と相性が良い</text>
  <text x="160" y="420" text-anchor="middle" class="platform-desc">読者は腰を据えて読む</text>
  <line x1="50" y1="455" x2="270" y2="455" class="platform-divider"/>
  <text x="50" y="495" class="platform-key-label">書き方のカギ</text>
  <text x="160" y="540" text-anchor="middle" class="platform-key">丁寧に語る</text>
  <text x="160" y="573" text-anchor="middle" class="platform-key">深く掘り下げる</text>
  <text x="160" y="606" text-anchor="middle" class="platform-key">感情を込める</text>
  <text x="160" y="655" text-anchor="middle" class="platform-desc" style="font-style: italic; fill: #666;">→ 第3章・第4章で詳解</text>

  <!-- ═══════════ Platform 2: SNS・YouTube ═══════════ -->
  <rect x="320" y="220" width="260" height="460" rx="10" class="platform-box"/>
  <!-- Header -->
  <rect x="320" y="220" width="260" height="80" rx="10" class="platform-header"/>
  <rect x="320" y="280" width="260" height="20" class="platform-header"/>
  <text x="340" y="252" class="platform-label">PLATFORM 02</text>
  <text x="450" y="285" text-anchor="middle" class="platform-title">SNS・YouTube</text>
  <!-- Body -->
  <text x="340" y="340" class="platform-desc-label">特徴</text>
  <text x="450" y="385" text-anchor="middle" class="platform-desc">短い言葉で勝負</text>
  <text x="450" y="420" text-anchor="middle" class="platform-desc">最初の一行で決まる</text>
  <line x1="340" y1="455" x2="560" y2="455" class="platform-divider"/>
  <text x="340" y="495" class="platform-key-label">書き方のカギ</text>
  <text x="450" y="540" text-anchor="middle" class="platform-key">削ぎ落とす</text>
  <text x="450" y="573" text-anchor="middle" class="platform-key">最短で伝える</text>
  <text x="450" y="606" text-anchor="middle" class="platform-key">冒頭で掴む</text>
  <text x="450" y="655" text-anchor="middle" class="platform-desc" style="font-style: italic; fill: #666;">→ 第6章で詳解</text>

  <!-- ═══════════ Platform 3: EC ═══════════ -->
  <rect x="610" y="220" width="260" height="460" rx="10" class="platform-box"/>
  <!-- Header -->
  <rect x="610" y="220" width="260" height="80" rx="10" class="platform-header"/>
  <rect x="610" y="280" width="260" height="20" class="platform-header"/>
  <text x="630" y="252" class="platform-label">PLATFORM 03</text>
  <text x="740" y="285" text-anchor="middle" class="platform-title">EC・個人物販</text>
  <!-- Body -->
  <text x="630" y="340" class="platform-desc-label">特徴</text>
  <text x="740" y="385" text-anchor="middle" class="platform-desc">売るための文章</text>
  <text x="740" y="420" text-anchor="middle" class="platform-desc">明確な目的がある</text>
  <line x1="630" y1="455" x2="850" y2="455" class="platform-divider"/>
  <text x="630" y="495" class="platform-key-label">書き方のカギ</text>
  <text x="740" y="540" text-anchor="middle" class="platform-key">買った後を描く</text>
  <text x="740" y="573" text-anchor="middle" class="platform-key">感情に訴える</text>
  <text x="740" y="606" text-anchor="middle" class="platform-key">生活の変化を伝える</text>
  <text x="740" y="655" text-anchor="middle" class="platform-desc" style="font-style: italic; fill: #666;">→ 本書のあちこちで触れる</text>

  <!-- ═══════════ Merging lines ═══════════ -->
  <line x1="160" y1="680" x2="160" y2="730" class="line-red"/>
  <line x1="450" y1="680" x2="450" y2="730" class="line-red"/>
  <line x1="740" y1="680" x2="740" y2="730" class="line-red"/>
  <line x1="160" y1="730" x2="740" y2="730" class="line-red"/>
  <line x1="450" y1="730" x2="450" y2="790" class="line-red"/>
  <polygon points="440,785 450,805 460,785" fill="#C44536"/>

  <!-- ═══════════ Core box: 共通する核 ═══════════ -->
  <rect x="120" y="810" width="660" height="180" rx="12" class="core-box"/>
  <text x="450" y="857" text-anchor="middle" class="core-label">3つに共通する核</text>
  <text x="450" y="912" text-anchor="middle" class="core-main">読者の問いに、誠実に応える</text>
  <text x="450" y="960" text-anchor="middle" class="core-sub">これさえブレなければ、どこでも言葉は届く</text>

  <!-- ═══════════ Divider ═══════════ -->
  <line x1="80" y1="1040" x2="820" y2="1040" class="divider-h"/>

  <!-- ═══════════ Bottom message ═══════════ -->
  <text x="450" y="1095" text-anchor="middle" class="footer-headline">書く場所は変わっても、届ける相手は変わらない</text>
</svg>
